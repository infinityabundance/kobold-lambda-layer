name: ci
on: [push, pull_request]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings        # default (lib + batch CLI)
      - run: cargo test --all
      - run: cargo check --features lambda                    # the Lambda handler type-checks
